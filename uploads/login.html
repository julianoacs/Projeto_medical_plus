<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #0d6efd;
        }

        /* LINKS */
        .links {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .links a {
            font-size: 13px;
            color: #0d6efd;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* ERRO */
        .erro {
            color: red;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* BOTÕES */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login {
            background: #0d6efd;
            color: white;
        }

        .btn-login:hover {
            background: #0b5ed7;
        }

        .btn-back {
            background: transparent;
            border: 2px solid #0d6efd;
            color: #0d6efd;
        }

        .btn-back:hover {
            background: #0d6efd;
            color: white;
        }

    </style>
</head>

<body>

<div class="login-card">
    <h2>Login</h2>

    <!-- ERRO -->
    <div th:if="${param.erro}" class="erro">
        Email ou senha inválidos
    </div>

    <form action="/login" method="post" autocomplete="off">

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Digite seu email" required autocomplete="off">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="Digite sua senha" required autocomplete="new-password">
        </div>

        <div class="links">
            <a href="/cadastro">Novo Cadastro</a>
            <a href="#">Recuperar senha</a>
        </div>

        <button type="submit" class="btn btn-login">Entrar</button>
        <button type="button" class="btn btn-back" onclick="location.href='/'">Voltar</button>

    </form>
</div>

<!-- LIMPAR CAMPOS AO VOLTAR -->
<script>
    window.addEventListener("pageshow", function () {
        document.querySelectorAll("input").forEach(input => input.value = "");
    });
</script>

</body>
</html>
