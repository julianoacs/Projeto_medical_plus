<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Exames - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f7fb;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #0d6efd;
            color: white;
        }

        header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .logo {
            color: white;
            text-decoration: none;
        }

        .login-btn {
            background: white;
            color: #0d6efd;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .top-bar {
            padding: 20px 40px 0 40px;
        }

        .back-btn {
            background: transparent;
            border: 2px solid #0d6efd;
            color: #0d6efd;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .container {
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .content {
            width: 100%;
            max-width: 700px;
        }

        .titulo {
            text-align: center;
            margin-bottom: 30px;
        }

        .lista {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 10px;
        }

        .exame-box {
            margin-bottom: 10px;
        }

        .item {
            padding: 18px 20px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            background: #ffffff;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .item:hover {
            background: #f1f5ff;
        }

        /* 🔥 EXPANSÃO */
        .medicos-box {
            display: none;
            padding: 15px 20px;
            background: #f9fbff;
            border: 1px solid #eee;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .medico-item {
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
        }

        .medico-item:last-child {
            border-bottom: none;
        }

        .empty {
            padding: 30px;
            text-align: center;
            color: #666;
        }

    </style>
</head>

<body>

<header>
    <h1>
        <a href="/" class="logo">Medical Plus</a>
    </h1>

    <button th:if="${usuario == null}"
            class="login-btn"
            onclick="location.href='/login'">
        Login
    </button>

    <button th:if="${usuario != null}"
            class="login-btn"
            onclick="location.href='/profile'">
        Profile
    </button>
</header>

<div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">Home</button>
</div>

<main class="container">

    <div class="content">
        <h2 class="titulo">Exames Disponíveis</h2>

        <div class="lista">

            <!-- 🔥 LISTA -->
            <div th:if="${!#lists.isEmpty(exames)}">

                <div th:each="exame : ${exames}" class="exame-box">

                    <!-- EXAME -->
                    <div class="item" onclick="toggleExame(this)">
                        <span th:text="${exame}"></span>
                    </div>

                    <!-- MÉDICOS -->
                    <div class="medicos-box">

                        <div th:each="m : ${medicos}"
                             th:if="${#lists.contains(m.exames, exame)}"
                             class="medico-item">

                            <strong th:text="'Dr(a) ' +${m.nome}"></strong><br>

                        </div>

                    </div>

                </div>

            </div>

            <!-- VAZIO -->
            <div th:if="${#lists.isEmpty(exames)}" class="empty">
                Nenhum exame disponível no momento.
            </div>

        </div>
    </div>

</main>

<script>
    function toggleExame(element) {

        const box = element.nextElementSibling;

        if (box.style.display === "block") {
            box.style.display = "none";
        } else {
            box.style.display = "block";
        }
    }
</script>

</body>
</html>
