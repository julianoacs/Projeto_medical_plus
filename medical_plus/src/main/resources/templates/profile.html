<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f7fb;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #0d6efd;
            color: white;
        }

        header h1 {
            font-size: 24px;
        }

        .logo {
            color: white;
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .home-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn {
            background: white;
            color: #0d6efd;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
        }

        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            border-right: 1px solid #eee;
        }

        .menu-item {
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu-item.active {
            background: #0d6efd;
            color: white;
        }

        .menu-item:hover {
            background: #f1f5ff;
        }

        .content {
            flex: 1;
            padding: 40px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .agendamento {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-cancelar {
            background: #dc3545;
            color: white;
        }

        .exame-container {
            display: flex;
            justify-content: space-between;
            background: #f1f5ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .form-exame {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .input-exame {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-add-exame {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-remover-exame {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
        }

    </style>
</head>

<body>

<header>
    <h1><a href="/" class="logo">Medical Plus</a></h1>

    <div class="header-actions">
        <button class="home-btn" onclick="location.href='/'">Home</button>
        <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
    </div>
</header>

<div class="container">

    <!-- MENU -->
    <div class="sidebar">

        <div class="menu-item" onclick="irParaAba('dados')">Dados</div>
        <div class="menu-item" onclick="irParaAba('historico')">Histórico</div>

        <!-- MÉDICO -->
        <div th:if="${usuario.tipo.equalsIgnoreCase('MEDICO')}">
            <div class="menu-item" onclick="irParaAba('exames')">Exames</div>
        </div>

        <!-- ADMIN -->
        <div th:if="${usuario.tipo.equalsIgnoreCase('ADMIN')}">
            <div class="menu-item" onclick="irParaAba('pacientes')">Pacientes</div>
            <div class="menu-item" onclick="irParaAba('medicos')">Médicos</div>
            <div class="menu-item" onclick="irParaAba('examesAdmin')">Exames</div>
        </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        <div id="dados" class="section">
            <div class="card">
                <p><strong>Nome:</strong> <span th:text="${usuario.nome}"></span></p>
                <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
                <p><strong>Tipo:</strong> <span th:text="${usuario.tipo}"></span></p>
            </div>
        </div>

        <div id="exames" class="section">
            <div class="card">

                <h2>Seus Exames</h2>

                <div th:each="ex : ${usuario.exames}" class="exame-container">
                    <span th:text="${ex}"></span>
                    <a th:href="@{/medico/remover-exame(exame=${ex})}" class="btn-remover-exame">Excluir</a>
                </div>

                <form action="/medico/adicionar-exame" method="post" class="form-exame">
                    <input type="text" name="exame" class="input-exame" required>
                    <button class="btn-add-exame">Adicionar</button>
                </form>

            </div>
        </div>

        <div id="examesAdmin" class="section">
            <div class="card">

                <h2>Todos os Exames</h2>

                <div th:each="ex : ${todosExames}" class="exame-container">

                    <div>
                        <strong th:text="${ex.nomeExame}"></strong><br>
                        <small>Dr(a): <span th:text="${ex.nomeMedico}"></span></small>
                    </div>

                    <a th:href="@{/admin/remover-exame(exame=${ex.nomeExame})}"
                       class="btn-remover-exame">
                        Excluir
                    </a>

                </div>

            </div>
        </div>

        <div id="historico" class="section">
            <div class="card">

                <div th:each="ag, stat : ${agendamentos}" class="agendamento">

                    <p th:if="${usuario.tipo.equalsIgnoreCase('ADMIN')}">
                        <strong>Paciente:</strong>
                        <span th:text="${ag.nomeUsuario}"></span>
                    </p>

                    <p><strong>Exame:</strong> <span th:text="${ag.exame}"></span></p>

                    <a th:href="@{/cancelar(index=${stat.index})}" class="btn-small btn-cancelar">
                        Cancelar
                    </a>

                </div>

            </div>
        </div>

        <div id="pacientes" class="section">
            <div class="card">
                <div th:each="p : ${pacientes}">
                    <p th:text="${p.nome}"></p>
                </div>
            </div>
        </div>

        <div id="medicos" class="section">
            <div class="card">
                <div th:each="m : ${medicos}">
                    <p th:text="${m.nome}"></p>
                </div>
            </div>
        </div>

    </div>

</div>

<script>

    function irParaAba(aba) {
        window.location.href = "/profile?aba=" + aba;
    }

    window.onload = function () {

        const params = new URLSearchParams(window.location.search);
        const aba = params.get("aba") || "dados";

        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));

        document.getElementById(aba)?.classList.add('active');

        document.querySelectorAll('.menu-item').forEach(m => {
            if (m.innerText.toLowerCase().includes(aba.toLowerCase())) {
                m.classList.add('active');
            }
        });

    };

</script>

</body>
</html>
