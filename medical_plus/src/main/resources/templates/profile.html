<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
        body { background:#f4f7fb; }

        header {
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 40px; background:#0d6efd; color:white;
        }

        header h1 { font-size:24px; font-weight:bold; }

        .logo { color:white; text-decoration:none; }

        .header-actions { display:flex; gap:10px; }

        .home-btn {
            background:transparent; border:2px solid white; color:white;
            padding:8px 16px; border-radius:8px; cursor:pointer;
        }

        .logout-btn {
            background:white; color:#0d6efd; border:none;
            padding:10px 20px; border-radius:8px; cursor:pointer;
        }

        .container { display:flex; height:calc(100vh - 80px); }

        .sidebar {
            width:250px; background:white; padding:20px;
            border-right:1px solid #eee;
        }

        .menu-item {
            padding:12px; margin-bottom:10px;
            cursor:pointer; border-radius:8px;
        }

        .menu-item.active { background:#0d6efd; color:white; }
        .menu-item:hover { background:#f1f5ff; }

        .content { flex:1; padding:40px; }

        .section { display:none; }
        .section.active { display:block; }

        .card {
            background:white; padding:25px; border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        /* EXAMES */
        .exame-container {
            display:flex; justify-content:space-between;
            background:#f1f5ff; padding:10px;
            border-radius:8px; margin-bottom:10px;
        }

        .btn-remover-exame {
            background:#dc3545; color:white;
            padding:5px 10px; border-radius:6px;
            text-decoration:none; font-size:12px;
        }

        .form-exame { display:flex; gap:10px; margin-top:10px; }

        .input-exame {
            flex:1; padding:10px;
            border-radius:8px; border:1px solid #ccc;
        }

        .btn-add-exame {
            background:#0d6efd; color:white;
            border:none; padding:10px;
            border-radius:8px; cursor:pointer;
        }

        /* STATUS */
        .status {
            padding:6px 10px;
            border-radius:6px;
            font-size:12px;
            display:inline-block;
        }

        .pendente { background:#ffc107; }
        .aprovado { background:#198754; color:white; }
        .rejeitado { background:#dc3545; color:white; }

        /* MÉDICOS ADMIN */
        .medico-box { margin-bottom:10px; }

        .medico-header {
            background:#fff;
            padding:15px;
            border-radius:10px;
            border:1px solid #eee;
            cursor:pointer;
        }

        .medico-header:hover { background:#f1f5ff; }

        .medico-detalhes {
            display:none;
            padding:15px;
            border:1px solid #eee;
            border-top:none;
            border-radius:0 0 10px 10px;
            background:#f9fbff;
        }

        .acoes-admin {
            display:flex;
            gap:10px;
            margin-top:10px;
        }

        .btn-aprovar {
            background:#198754;
            color:white;
            padding:6px 12px;
            border-radius:6px;
            text-decoration:none;
        }

        .btn-rejeitar {
            background:#dc3545;
            color:white;
            padding:6px 12px;
            border-radius:6px;
            text-decoration:none;
        }
    </style>
</head>

<body>

<header>
    <h1><a href="/" class="logo">Medical Plus</a></h1>

    <div class="header-actions">
        <button class="home-btn" onclick="location.href='/'">Home</button>
        <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
    </div>
</header>

<div class="container">

    <!-- MENU -->
    <div class="sidebar">

        <div class="menu-item" onclick="irParaAba('dados')">Dados</div>
        <div class="menu-item" onclick="irParaAba('historico')">Histórico</div>

        <div th:if="${usuario.tipo.equalsIgnoreCase('MEDICO')}">
            <div class="menu-item" onclick="irParaAba('exames')">Exames</div>
            <div class="menu-item" onclick="irParaAba('documentos')">Documentos</div>
        </div>

        <div th:if="${usuario.tipo.equalsIgnoreCase('ADMIN')}">
            <div class="menu-item" onclick="irParaAba('pacientes')">Pacientes</div>
            <div class="menu-item" onclick="irParaAba('medicos')">Médicos</div>
            <div class="menu-item" onclick="irParaAba('examesAdmin')">Exames</div>
        </div>

    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        <!-- DADOS -->
        <div id="dados" class="section">
            <div class="card">
                <p><strong>Nome:</strong> <span th:text="${usuario.nome}"></span></p>
                <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
                <p><strong>Tipo:</strong> <span th:text="${usuario.tipo}"></span></p>
            </div>
        </div>

        <!-- DOCUMENTOS -->
        <div id="documentos" class="section">
            <div class="card">

                <h2>Documentos</h2>
                <br>

                <div th:if="${#lists.isEmpty(usuario.documentos)}">
                    Nenhum documento enviado
                </div>

                <div th:each="doc : ${usuario.documentos}" class="medico-box">

                    <div class="medico-header" onclick="toggleMedico(this)">
                        <strong th:text="${doc.nomeArquivo}"></strong>
                    </div>

                    <div class="medico-detalhes">

                <span th:text="${doc.status}"
                      th:class="'status ' +
                      (${doc.status} == 'APROVADO' ? 'aprovado' :
                      (${doc.status} == 'REJEITADO' ? 'rejeitado' : 'pendente'))">
                </span>

                        <br><br>

                        <a th:href="@{'/uploads/' + ${doc.nomeArquivo}}"
                           target="_blank"
                           class="btn-aprovar">
                            Abrir PDF
                        </a>

                    </div>

                </div>

                <br>

                <form action="/medico/upload-documento" method="post" enctype="multipart/form-data">
                    <input type="file" name="arquivo" required>
                    <br><br>
                    <button class="btn-add-exame">Enviar</button>
                </form>

            </div>
        </div>

        <!-- MÉDICOS ADMIN -->
        <div id="medicos" class="section">
            <div class="card">

                <h2>Médicos</h2>
                <br>

                <div th:each="m : ${medicos}" class="medico-box">

                    <div class="medico-header" onclick="toggleMedico(this)">
                        <strong th:text="'Dr(a) ' + ${m.nome}"></strong>
                    </div>

                    <div class="medico-detalhes">

                        <p><strong>Email:</strong> <span th:text="${m.email}"></span></p>

                        <div th:if="${#lists.isEmpty(m.documentos)}">
                            Nenhum documento enviado
                        </div>

                        <div th:each="doc : ${m.documentos}">

                            <hr>

                            <p th:text="${doc.nomeArquivo}"></p>

                            <span th:text="${doc.status}"
                                  th:class="'status ' +
                          (${doc.status} == 'APROVADO' ? 'aprovado' :
                          (${doc.status} == 'REJEITADO' ? 'rejeitado' : 'pendente'))">
                    </span>

                            <br><br>

                            <a th:href="@{'/uploads/' + ${doc.nomeArquivo}}"
                               target="_blank"
                               class="btn-aprovar">
                                Abrir
                            </a>

                            <div class="acoes-admin">
                                <a th:href="@{/admin/aprovar-documento(email=${m.email}, arquivo=${doc.nomeArquivo})}"
                                   class="btn-aprovar">
                                    Aprovar
                                </a>

                                <a th:href="@{/admin/rejeitar-documento(email=${m.email}, arquivo=${doc.nomeArquivo})}"
                                   class="btn-rejeitar">
                                    Rejeitar
                                </a>
                            </div>

                        </div>

                    </div>

                </div>

            </div>
        </div>

    </div>
</div>

<script>
    function irParaAba(aba) {
        window.location.href = "/profile?aba=" + aba;
    }

    function toggleMedico(element) {
        const detalhes = element.nextElementSibling;
        detalhes.style.display = detalhes.style.display === "block" ? "none" : "block";
    }

    window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        const aba = params.get("aba") || "dados";

        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));

        document.getElementById(aba)?.classList.add('active');
    };
</script>

</body>
</html>
