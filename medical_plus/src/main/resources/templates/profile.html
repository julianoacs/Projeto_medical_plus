<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f7fb;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #0d6efd;
            color: white;
        }

        header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .logo {
            color: white;
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .home-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .home-btn:hover {
            background: white;
            color: #0d6efd;
        }

        .logout-btn {
            background: white;
            color: #0d6efd;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* LAYOUT */
        .container {
            display: flex;
            height: calc(100vh - 80px);
        }

        .sidebar {
            width: 250px;
            background: white;
            padding: 20px;
            border-right: 1px solid #eee;
        }

        .menu-item {
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu-item.active {
            background: #0d6efd;
            color: white;
        }

        .menu-item:hover {
            background: #f1f5ff;
        }

        .content {
            flex: 1;
            padding: 40px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* HISTÓRICO */
        .agendamento {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 12px;
        }

        .btn-cancelar {
            background: #dc3545;
            color: white;
        }

        .btn-remarcar {
            background: #ffc107;
        }

        /* MÉDICO */

        .exame-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .form-exame {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .input-exame {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-add-exame {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-add-exame:hover {
            background: #0b5ed7;
        }

        .btn-remover-exame {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
        }

        .btn-remover-exame:hover {
            background: #bb2d3b;
        }

    </style>
</head>

<body>

<header>
    <h1>
        <a href="/" class="logo">Medical Plus</a>
    </h1>

    <div class="header-actions">
        <button class="home-btn" onclick="location.href='/'">Home</button>
        <button class="logout-btn" onclick="location.href='/logout'">Logout</button>
    </div>
</header>

<div class="container">

    <!-- MENU -->
    <div class="sidebar">
        <div class="menu-item active" onclick="mostrarSecao('dados')">Dados</div>
        <div class="menu-item" onclick="mostrarSecao('historico')">Histórico</div>

        <div th:if="${usuario.tipo == 'ADMIN'}">
            <div class="menu-item" onclick="mostrarSecao('pacientes')">Pacientes</div>
            <div class="menu-item" onclick="mostrarSecao('medicos')">Médicos</div>
        </div>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        <!-- DADOS -->
        <div id="dados" class="section active">
            <div class="card">

                <p><strong>Nome:</strong> <span th:text="${usuario.nome}"></span></p>
                <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
                <p><strong>Tipo:</strong> <span th:text="${usuario.tipo}"></span></p>

                <!-- MÉDICO -->
                <div th:if="${usuario.tipo == 'MEDICO'}">

                    <hr style="margin:20px 0;">

                    <h3>Exames que você realiza</h3>

                    <div th:if="${#lists.isEmpty(usuario.exames)}">
                        <p style="color:#666;">Nenhum exame cadastrado</p>
                    </div>

                    <div th:each="ex : ${usuario.exames}" class="exame-container">
                        <span th:text="${ex}"></span>

                        <a th:href="@{/medico/remover-exame(exame=${ex})}" class="btn-remover-exame">
                            Excluir
                        </a>
                    </div>

                    <form action="/medico/adicionar-exame" method="post" class="form-exame">
                        <input type="text" name="exame" placeholder="Novo exame" class="input-exame" required>
                        <button type="submit" class="btn-add-exame">Adicionar</button>
                    </form>

                </div>

            </div>
        </div>

        <!-- HISTÓRICO -->
        <div id="historico" class="section">
            <div class="card">

                <h2>Histórico</h2>
                <br>

                <div th:if="${#lists.isEmpty(agendamentos)}">
                    Nenhuma consulta
                </div>

                <div th:each="ag, stat : ${agendamentos}" class="agendamento">

                    <p th:if="${usuario.tipo == 'ADMIN'}">
                        <strong>Paciente:</strong>
                        <span th:text="${ag.nomeUsuario}"></span>
                    </p>

                    <p><strong>Exame:</strong> <span th:text="${ag.exame}"></span></p>
                    <p><strong>Médico:</strong> <span th:text="${ag.medico}"></span></p>
                    <p><strong>Data:</strong> <span th:text="${ag.data}"></span></p>
                    <p><strong>Hora:</strong> <span th:text="${ag.hora}"></span></p>

                    <a th:href="@{/cancelar(index=${stat.index})}" class="btn-small btn-cancelar">
                        Cancelar
                    </a>

                </div>

            </div>
        </div>

        <!-- PACIENTES -->
        <div id="pacientes" class="section">
            <div class="card">
                <h2>Pacientes</h2>
                <br>

                <div th:each="p : ${pacientes}">
                    <p><strong>Nome:</strong> <span th:text="${p.nome}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${p.email}"></span></p>
                    <hr>
                </div>
            </div>
        </div>

        <!-- MÉDICOS -->
        <div id="medicos" class="section">
            <div class="card">
                <h2>Médicos</h2>
                <br>

                <div th:each="m : ${medicos}">
                    <p><strong>Nome:</strong> <span th:text="${m.nome}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${m.email}"></span></p>
                    <hr>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
    function mostrarSecao(secao) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));

        document.getElementById(secao).classList.add('active');
        event.target.classList.add('active');
    }
</script>

</body>
</html>
