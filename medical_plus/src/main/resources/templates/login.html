<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="icon" type="image/png" href="/images/telemed.png">
</head>
<body>

<main class="login-main">
    <div class="login-card">

        <!-- Background gradient sutil -->
        <div class="card-bg"></div>

        <div class="card-content">

            <!-- Logo -->
            <div class="brand" onclick="location.href='/landing'">
                <img src="/images/telemed.png" alt="Logo">
                <span>MED CONNECT</span>
            </div>

            <!-- Título -->
            <h1>Entrar</h1>
            <p class="subtitle">Acesse sua conta para agendar consultas</p>

            <!-- Erro -->
            <div th:if="${param.erro}" class="erro">Email ou senha inválidos</div>

            <!-- Form -->
            <form action="/login" method="post" autocomplete="off">
                <input type="email"    name="email" placeholder="Seu e-mail" required autocomplete="off">
                <div class="senha-wrapper">
                    <input type="password" id="senhaLogin" name="senha" placeholder="Sua senha" required autocomplete="new-password">
                    <button type="button" class="olho-btn" onclick="toggleSenha('senhaLogin', this)" title="Mostrar/ocultar senha">
                        <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="btn-entrar">Entrar</button>
                <button type="button" class="btn-voltar" onclick="location.href='/landing'">Voltar</button>
            </form>

            <!-- Links -->
            <div class="form-links">
                <button onclick="void(0)" class="link-btn">Esqueci minha senha</button>
                <button onclick="location.href='/cadastro'" class="link-btn">Criar conta</button>
            </div>

        </div>
    </div>
</main>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
