<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Exames - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/exames.css}">
    <link rel="icon" type="image/png" href="/images/telemed.png">
</head>
<body>

  <header class="header-shell">
    <a href="/landing" class="header-brand">
      <img src="/images/telemed.png" alt="Logo">
      <span>MED CONNECT</span>
    </a>
    <nav class="header-nav">
      <button class="nav-btn" onclick="location.href='/como'">Como Funciona</button>
      <button class="nav-btn" onclick="location.href='/especialidades'">Especialidades</button>
      <button class="nav-btn" onclick="location.href='/sobre'">Sobre Nós</button>
    </nav>
    <div class="header-cta">
      <button th:if="${usuario == null}" class="btn-agendar" onclick="location.href='/login'">Login</button>
      <button th:if="${usuario != null}" class="btn-profile" onclick="location.href='/profile'">Profile</button>
    </div>
  </header>

  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/home'">← Home</button>
  </div>

  <main class="container">
    <div class="content">
      <h2 class="titulo">Exames Disponíveis</h2>
      <div class="lista">
        <div th:if="${!#lists.isEmpty(exames)}">
          <div th:each="exame : ${exames}" class="exame-box">
            <div class="item" onclick="toggleExame(this)">
              <span th:text="${exame}"></span>
            </div>
            <div class="medicos-box">
              <div th:each="m : ${medicos}"
                   th:if="${#lists.contains(m.exames, exame)}"
                   class="medico-item">
                <strong th:text="'Dr(a) ' + ${m.nome}"></strong><br>
              </div>
            </div>
          </div>
        </div>
        <div th:if="${#lists.isEmpty(exames)}" class="empty">
          Nenhum exame disponível no momento.
        </div>
      </div>
    </div>
  </main>

  <script th:src="@{/js/exames.js}"></script>
</body>
</html>
