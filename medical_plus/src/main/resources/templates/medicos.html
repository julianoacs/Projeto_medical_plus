<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Médicos - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/medicos.css}">
    <link rel="icon" type="image/png" href="/images/telemed.png">
</head>
<body>

  <header class="header-shell">
    <a href="/landing" class="header-brand">
      <img src="/images/telemed.png" alt="Logo">
      <span>MED CONNECT</span>
    </a>
    <nav class="header-nav">
      <button class="nav-btn" onclick="location.href='/como'">Como Funciona</button>
      <button class="nav-btn" onclick="location.href='/sobre'">Sobre Nós</button>
    </nav>
    <div class="header-cta">
      <button th:if="${usuario == null}" class="btn-agendar" onclick="location.href='/login'">Login</button>
      <button th:if="${usuario != null}" class="btn-profile" onclick="location.href='/profile'">Profile</button>
    </div>
  </header>

  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/home'">← Home</button>
  </div>

  <main class="container">
    <div class="content">
      <h2 class="titulo">Médicos Disponíveis</h2>
      <div class="lista">
        <div th:each="m : ${medicos}" class="item">
          <div>
            <span class="nome" th:text="'Dr(a) ' + ${m.nome}"></span><br>
            <span class="especialidade"
                  th:text="${m.especialidade != null && !m.especialidade.isEmpty() ? m.especialidade : 'Sem Especialidade'}">
            </span>
            <div th:if="${!#lists.isEmpty(m.locaisAtendimento)}" style="margin-top:6px;">
              <div th:each="local : ${m.locaisAtendimento}" style="font-size:0.82rem; color:#6b7280; margin-top:2px;">
                📍 <span th:text="${local.nome}"></span>
                <span th:if="${local.endereco != null && !local.endereco.isEmpty()}"
                      th:text="' — ' + ${local.endereco}"></span>
              </div>
            </div>
          </div>
        </div>
        <div th:if="${#lists.isEmpty(medicos)}" class="empty">
          Nenhum médico cadastrado no momento.
        </div>
      </div>
    </div>
  </main>

</body>
</html>
