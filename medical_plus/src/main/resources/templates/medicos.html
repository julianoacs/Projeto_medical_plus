<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Médicos - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f7fb;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #0d6efd;
            color: white;
        }

        header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .logo {
            color: white;
            text-decoration: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .login-btn {
            background: white;
            color: #0d6efd;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #e6e6e6;
        }

        /* BOTÃO VOLTAR */
        .top-bar {
            padding: 20px 40px 0 40px;
        }

        .back-btn {
            background: transparent;
            border: 2px solid #0d6efd;
            color: #0d6efd;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #0d6efd;
            color: white;
        }

        /* CONTAINER */
        .container {
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .content {
            width: 100%;
            max-width: 700px;
        }

        .titulo {
            text-align: center;
            margin-bottom: 30px;
        }

        /* LISTA */
        .lista {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
            transition: 0.2s;
            cursor: pointer;
        }

        .item:hover {
            background: #f1f5ff;
        }

        .item:last-child {
            border-bottom: none;
        }

        .nome {
            font-weight: 500;
        }

        .especialidade {
            color: #666;
        }

    </style>
</head>
<body>

<header>
    <h1>
        <a href="/" class="logo">Medical Plus</a>
    </h1>

    <!-- NÃO LOGADO -->
    <button th:if="${usuario == null}"
            class="login-btn"
            onclick="location.href='/login'">
        Login
    </button>

    <!-- LOGADO -->
    <button th:if="${usuario != null}"
            class="login-btn"
            onclick="location.href='/profile'">
        Profile
    </button>
</header>

<div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">Home</button>
</div>

<main class="container">

    <div class="content">
        <h2 class="titulo">Médicos Disponíveis</h2>

        <div class="lista">

            <div th:each="m : ${medicos}" class="item">

                <div>
            <span class="nome"
                  th:text="'Dr(a) ' + ${m.nome}"></span>
                    <br>
                    <span class="especialidade"
                          th:text="${m.especialidade != null && !m.especialidade.isEmpty()
                          ? m.especialidade
                          : 'Sem Especialidade'}">
            </span>
                </div>

            </div>

        </div>
    </div>

</main>

</body>
</html>
