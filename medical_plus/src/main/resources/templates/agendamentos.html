<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agendamentos - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f7fb;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #0d6efd;
            color: white;
        }

        header h1 {
            font-size: 24px;
        }

        .logo {
            color: white;
            text-decoration: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .profile-btn {
            background: white;
            color: #0d6efd;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .profile-btn:hover {
            background: #e6e6e6;
        }

        /* CONTAINER */
        .container {
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group select,
        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        .input-group select:focus,
        .input-group input:focus {
            border-color: #0d6efd;
        }

        /* BOTÕES */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-agendar {
            background: #0d6efd;
            color: white;
        }

        .btn-agendar:hover {
            background: #0b5ed7;
        }

        .btn-back {
            background: transparent;
            border: 2px solid #0d6efd;
            color: #0d6efd;
        }

        .btn-back:hover {
            background: #0d6efd;
            color: white;
        }

    </style>
</head>
<body>

<header>
    <h1>
        <a href="/" class="logo">Medical Plus</a>
    </h1>

    <button class="profile-btn" onclick="location.href='/profile'">
        Profile
    </button>
</header>

<div class="container">

    <div class="card">
        <h2>Novo Agendamento</h2>

        <form action="/agendar" method="post">

            <!-- EXAME -->
            <div class="input-group">
                <label>Tipo de Exame</label>
                <select name="exame" required>
                    <option value="">Selecione</option>
                    <option th:each="exame : ${exames}"
                            th:value="${exame}"
                            th:text="${exame}">
                    </option>
                </select>
            </div>

            <!-- MÉDICO -->
            <div class="input-group">
                <label>Médico</label>
                <select name="medico" required>
                    <option value="">Selecione</option>
                    <option th:each="medico : ${medicos}"
                            th:value="${medico}"
                            th:text="${medico}">
                    </option>
                </select>
            </div>

            <!-- DATA -->
            <div class="input-group">
                <label>Data</label>
                <input type="date" name="data" required>
            </div>

            <!-- HORA -->
            <div class="input-group">
                <label>Hora</label>
                <input type="time" name="hora" required>
            </div>

            <!-- BOTÕES -->
            <button type="submit" class="btn btn-agendar">
                Agendar Consulta
            </button>

            <button type="button" class="btn btn-back" onclick="location.href='/'">
                Voltar
            </button>

        </form>
    </div>

</div>

</body>
</html>
