<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .cadastro-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .cadastro-card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #0d6efd;
        }

        /* BOTÕES */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-cadastrar {
            background: #0d6efd;
            color: white;
        }

        .btn-cadastrar:hover {
            background: #0b5ed7;
        }

        .btn-back {
            background: transparent;
            border: 2px solid #0d6efd;
            color: #0d6efd;
        }

        .btn-back:hover {
            background: #0d6efd;
            color: white;
        }

    </style>
</head>
<body>

<div class="cadastro-card">
    <h2>Cadastro</h2>

    <form action="/cadastrar" method="post" autocomplete="off">

        <div class="input-group">
            <label>Nome</label>
            <input type="text" name="nome" placeholder="Digite seu nome" autocomplete="off" required>
        </div>

        <div class="input-group">
            <label>Data de Nascimento</label>
            <input type="date" name="dataNascimento" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Digite seu email" autocomplete="off" required>
        </div>

        <div class="input-group">
            <label>CPF</label>
            <input type="text" name="cpf" placeholder="Digite seu CPF" autocomplete="off" required>
        </div>

        <div class="input-group">
            <label>Tipo de Usuário</label>
            <select name="tipo" required>
                <option value="">Selecione</option>
                <option value="medico">Médico</option>
                <option value="paciente">Paciente</option>
            </select>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="Digite sua senha" autocomplete="new-password" required>
        </div>

        <button type="submit" class="btn btn-cadastrar">Cadastrar</button>
        <button type="button" class="btn btn-back" onclick="location.href='/login'">Voltar</button>

    </form>
</div>

<!-- SCRIPT PROFISSIONAL -->
<script>
    window.addEventListener("pageshow", function () {
        document.querySelectorAll("input").forEach(input => input.value = "");
        document.querySelectorAll("select").forEach(select => select.selectedIndex = 0);
    });
</script>

</body>
</html>
