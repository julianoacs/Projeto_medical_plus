<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Medical Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/cadastro.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
<div class="cadastro-card">
    <h2>Cadastro</h2>
    <form action="/cadastrar" method="post" autocomplete="off">
        <div class="input-group">
            <label>Nome</label>
            <input type="text" name="nome" placeholder="Digite seu nome" autocomplete="off" required>
        </div>
        <div class="input-group">
            <label>Data de Nascimento</label>
            <input type="date" name="dataNascimento" required>
        </div>
        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Digite seu email" autocomplete="off" required>
        </div>
        <div class="input-group">
            <label>CPF</label>
            <input type="text" name="cpf" placeholder="Digite seu CPF" autocomplete="off" required>
        </div>
        <div class="input-group">
            <label>Tipo de Usuário</label>
            <select name="tipo" required>
                <option value="">Selecione</option>
                <option value="medico">Médico</option>
                <option value="paciente">Paciente</option>
            </select>
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="Digite sua senha" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-cadastrar">Cadastrar</button>
        <button type="button" class="btn btn-back" onclick="location.href='/login'">Voltar</button>
    </form>
</div>
<script th:src="@{/js/cadastro.js}"></script>
</body>
</html>
